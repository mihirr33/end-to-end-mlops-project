apiVersion: apps/v1
kind: Deployment

metadata:
  name: churn-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: churn-api

  template:
    metadata:
      labels:
        app: churn-api

    spec:
      containers:
      - name: churn-api
        image: shre51/churn-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000