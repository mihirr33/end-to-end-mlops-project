apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ryvonexa-ai
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/mihirr33/end-to-end-mlops-project.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: churn-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true