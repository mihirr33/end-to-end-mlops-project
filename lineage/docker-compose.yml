services:
  postgres:
    image: postgres:14
    container_name: marquez-db
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: marquezproject/marquez:0.50.0
    container_name: marquez-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MARQUEZ_CONFIG: /opt/marquez/marquez.yml
    volumes:
      - ./marquez.yml:/opt/marquez/marquez.yml
    ports:
      - "5000:5000"

  web:
    image: marquezproject/marquez-web:0.50.0
    container_name: marquez-web
    depends_on:
      - api
    environment:
      MARQUEZ_HOST: api
      MARQUEZ_PORT: 5000
      WEB_PORT: 3000
      REACT_APP_ADVANCED_SEARCH: "true"
    ports:
      - "3001:3000"