name: MLOps CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Ingestion Test
        env:
          PYTHONPATH: ${{ github.workspace }}
          run: python -m tests.test_data_ingestion

      - name: Run Data Validation Test
        env:
          PYTHONPATH: ${{ github.workspace }}
          run: python -m tests.test_data_validation

      - name: Run Data Transformation Test
        env:
          PYTHONPATH: ${{ github.workspace }}
          run: python -m tests.test_data_transformation

      - name: Run Model Trainer Test
        env:
          PYTHONPATH: ${{ github.workspace }}
          run: python -m tests.test_model_trainer