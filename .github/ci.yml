name: MLOps CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Ingestion Test
        run: python test_data_ingestion.py

      - name: Run Data Validation Test
        run: python test_data_validation.py

      - name: Run Data Transformation Test
        run: python test_data_transformation.py

      - name: Run Model Trainer Test
        run: python test_model_trainer.py