name: End-to-End MLOps CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m tests.test_configuration
          python -m tests.test_logger
          python -m tests.test_exception

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Docker Image
        run: |
          docker build -t shre51/churn-backend:latest .

      - name: Push Backend Docker Image
        run: |
          docker push shre51/churn-backend:latest

      - name: Build Frontend Docker Image
        run: |
          docker build -t shre51/churn-frontend:latest ./frontend

      - name: Push Frontend Docker Image
        run: |
          docker push shre51/churn-frontend:latest