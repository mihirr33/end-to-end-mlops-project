name: MLOps CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify Project Imports
        run: |
          python -c "import app"
          python -c "from src.pipeline.prediction_pipeline import PredictionPipeline"
          python -c "from src.components.model_trainer import ModelTrainer"

      - name: Verify Project Structure
        run: |
          ls
          ls src